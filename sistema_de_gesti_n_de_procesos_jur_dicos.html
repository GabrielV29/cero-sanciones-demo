    // --- COMPONENTE PRINCIPAL DE LA APLICACIÓN ---
    const MainApp = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [currentUser, setCurrentUser] = useState(null);
      const [currentView, setCurrentView] = useState("dashboard");
      const [sidebarOpen, setSidebarOpen] = useState(false);

      // Datos reactivos
      const [cases, setCases] = useState(INITIAL_CASES);
      const [documents, setDocuments] = useState(INITIAL_DOCUMENTS);
      const [users, setUsers] = useState(INITIAL_USERS);
      const [hearings, setHearings] = useState(INITIAL_HEARINGS);
      const [notifications, setNotifications] = useState(INITIAL_NOTIFICATIONS);

      // Control de Modales
      const [isAddCaseOpen, setIsAddCaseOpen] = useState(false);
      const [isAddDocOpen, setIsAddDocOpen] = useState(false);
      const [isDetailOpen, setIsDetailOpen] = useState(false);
      const [selectedDetail, setSelectedDetail] = useState(null);

      const [toast, setToast] = useState(null);

      const showToast = (message, type = 'info') => {
        setToast({ message, type });
      };

      const handleLogin = (userObj) => {
        setCurrentUser(userObj);
        setIsLoggedIn(true);
        showToast("¡Sesión iniciada correctamente en Cero Sanciones!", "success");
      };

      const handleLogout = () => {
        setIsLoggedIn(false);
        setCurrentUser(null);
        setCurrentView("dashboard");
        setSidebarOpen(false);
      };

      // Manejo de Casos
      const handleAddCase = (newCase) => {
        setCases([newCase, ...cases]);
        showToast(`Caso '${newCase.client}' guardado correctamente.`, 'success');
        
        const newNotif = {
          id: `n_${Date.now()}`,
          title: "Expediente Creado",
          desc: `Se ha abierto un expediente para ${newCase.client}.`,
          time: "Hace 1 min",
          type: "case",
          read: false
        };
        setNotifications([newNotif, ...notifications]);

        if (newCase.date && newCase.date !== "-") {
          // Parse date for calendar mapping
          const formattedDate = newCase.date.includes("/") ? newCase.date.split("/").reverse().join("-") : newCase.date;
          const newHearing = {
            id: `h_${Date.now()}`,
            title: `Juicio - ${newCase.client.split(" ")[0]}`,
            date: formattedDate,
            time: "11:30 AM",
            type: "Civil",
            badgeColor: "bg-blue-100 text-blue-800 border-blue-300"
          };
          setHearings([newHearing, ...hearings]);
        }
      };

      const handleDeleteCase = (id) => {
        setCases(cases.filter(c => c.id !== id));
        showToast("Caso eliminado correctamente del sistema.", "success");
      };

      const handleViewDetail = (caseObj) => {
        setSelectedDetail(caseObj);
        setIsDetailOpen(true);
      };

      // Manejo de Documentos
      const handleAddDoc = (newDoc) => {
        const id = `d_${Date.now()}`;
        setDocuments([{ id, ...newDoc }, ...documents]);
        showToast(`Documento '${newDoc.name}' subido correctamente.`, 'success');
        
        const newNotif = {
          id: `n_${Date.now()}`,
          title: "Documento digitalizado",
          desc: `Se cargó '${newDoc.name}' en la carpeta ${newDoc.folder}.`,
          time: "Hace 1 min",
          type: "doc",
          read: false
        };
        setNotifications([newNotif, ...notifications]);
      };

      const handleDeleteDoc = (id) => {
        setDocuments(documents.filter(d => d.id !== id));
        showToast("Archivo eliminado permanentemente.", "info");
      };

      // Manejo de Usuarios
      const handleAddUser = () => {
        const name = prompt("Ingrese nombre del nuevo abogado/usuario:");
        if (!name) return;
        const email = prompt("Ingrese su correo corporativo:");
        if (!email) return;
        const role = prompt("Ingrese su cargo (Abogada, Procurador, Asistente Legal, Juez):", "Asistente Legal");
        if (!role) return;

        const newUser = {
          id: `u_${Date.now()}`,
          name,
          role,
          email,
          status: "Activo",
          avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150"
        };

        setUsers([...users, newUser]);
        showToast(`Usuario ${name} registrado en Cero Sanciones.`, "success");
      };

      const handleToggleUserStatus = (id) => {
        setUsers(users.map(u => u.id === id ? { ...u, status: u.status === 'Activo' ? 'Inactivo' : 'Activo' } : u));
        showToast("Estado de usuario actualizado correctamente.", "info");
      };

      // Notificaciones
      const handleMarkRead = (id) => {
        setNotifications(notifications.map(n => n.id === id ? { ...n, read: true } : n));
      };

      const handleMarkAllRead = () => {
        setNotifications(notifications.map(n => ({ ...n, read: true })));
        showToast("Todas las notificaciones leídas.", "info");
      };

      const handleDeleteNotification = (id) => {
        setNotifications(notifications.filter(n => n.id !== id));
      };

      const unreadCount = notifications.filter(n => !n.read).length;

      const renderView = () => {
        switch (currentView) {
          case "dashboard":
            return (
              <DashboardView 
                cases={cases}
                hearings={hearings}
                documents={documents}
                notifications={notifications}
                users={users}
                onViewChange={setCurrentView}
                onAddCaseClick={() => setIsAddCaseOpen(true)}
              />
            );
          case "cases":
            return (
              <CasesView 
                cases={cases}
                onAddCaseClick={() => setIsAddCaseOpen(true)}
                onDeleteCase={handleDeleteCase}
                onViewDetail={handleViewDetail}
              />
            );
          case "calendar":
            return (
              <CalendarView 
                hearings={hearings}
                onAddEventClick={() => {
                  showToast("Crea un expediente indicando la fecha para agendar audiencias automáticamente.", "info");
                }}
              />
            );
          case "documents":
            return (
              <DocumentsView 
                documents={documents}
                onAddDocClick={() => setIsAddDocOpen(true)}
                onDeleteDoc={handleDeleteDoc}
                toastInfo={(msg, type) => showToast(msg, type)}
              />
            );
          case "reports":
            return <ReportsView cases={cases} toastInfo={(msg, type) => showToast(msg, type)} />;
          case "users":
            return <UsersView users={users} onAddUserClick={handleAddUser} onToggleUserStatus={handleToggleUserStatus} />;
          case "settings":
            return <SettingsView user={currentUser} toastInfo={(msg, type) => showToast(msg, type)} />;
          case "notifications":
            return (
              <NotificationsView 
                notifications={notifications}
                onMarkRead={handleMarkRead}
                onMarkAllRead={handleMarkAllRead}
                onDeleteNotification={handleDeleteNotification}
              />
            );
          default:
            return <DashboardView />;
        }
      };

      if (!isLoggedIn) {
        return <LoginScreen onLogin={handleLogin} />;
      }

      const viewTitles = {
        dashboard: "Dashboard de Control",
        cases: "Mis Procesos",
        calendar: "Calendario Jurídico",
        documents: "Gestor Documental",
        reports: "Reportes & Analíticas",
        users: "Usuarios del Equipo",
        settings: "Configuración",
        notifications: "Centro de Notificaciones"
      };

      return (
        <div class="min-h-screen flex bg-slate-50 relative overflow-x-hidden">
          <Sidebar 
            currentView={currentView}
            onViewChange={setCurrentView}
            unreadCount={unreadCount}
            onLogout={handleLogout}
            isOpen={sidebarOpen}
            onClose={() => setSidebarOpen(false)}
          />

          <div class="flex-1 flex flex-col min-h-screen overflow-x-hidden">
            <Header 
              title={viewTitles[currentView]}
              user={currentUser}
              notifications={notifications}
              onViewChange={setCurrentView}
              onToggleSidebar={() => setSidebarOpen(!sidebarOpen)}
            />
            
            <main class="flex-grow">
              {renderView()}
            </main>
          </div>

          <AddCaseModal 
            isOpen={isAddCaseOpen}
            onClose={() => setIsAddCaseOpen(false)}
            onAdd={handleAddCase}
          />

          <AddDocModal 
            isOpen={isAddDocOpen}
            onClose={() => setIsAddDocOpen(false)}
            onAdd={handleAddDoc}
          />

          <CaseDetailModal 
            isOpen={isDetailOpen}
            onClose={() => setIsDetailOpen(false)}
            detail={selectedDetail}
          />

          {toast && (
            <Toast 
              message={toast.message}
              type={toast.type}
              onClose={() => setToast(null)}
            />
          )}
        </div>
      );
    };

    // Renderizado en DOM de React18
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
